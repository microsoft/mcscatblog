<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1a33"/>
      <stop offset="100%" stop-color="#102a52"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowLight" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#cbd5e1"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1e3a6b" stroke-width="1" opacity="0.35">
    <path d="M0 160 H1200"/>
    <path d="M0 320 H1200"/>
    <path d="M0 480 H1200"/>
  </g>

  <!-- Top-right Copilot Studio badge -->
  <g transform="translate(960,38)">
    <rect width="200" height="36" rx="18" fill="#1e3a6b" stroke="#3b82f6" stroke-opacity="0.5"/>
    <circle cx="22" cy="18" r="7" fill="url(#cyan)"/>
    <text x="40" y="23" fill="#cbd5e1" font-size="14" font-weight="600" letter-spacing="0.5">Copilot Studio</text>
  </g>

  <!-- TITLE BLOCK (left) -->
  <g transform="translate(70,160)">
    <text x="0" y="0" fill="#ffffff" font-size="72" font-weight="700" letter-spacing="-1">Agents and</text>
    <g transform="translate(0,90)">
      <text x="0" y="0" fill="#ffffff" font-size="72" font-weight="700" letter-spacing="-1">Workflows</text>
    </g>
    <!-- Accent rule -->
    <rect x="0" y="118" width="80" height="5" rx="2" fill="url(#orange)"/>
    <!-- Subtitle -->
    <text x="0" y="170" fill="#cbd5e1" font-size="28" font-weight="500">Three Integration Patterns</text>
    <!-- Author byline under subtitle -->
    <text x="0" y="213" fill="#94a3b8" font-size="15" font-weight="600" letter-spacing="2">JAY PADIMITI</text>
  </g>

  <!-- THREE PATTERN THUMBNAILS (right) -->
  <g transform="translate(720,110)">
    <!-- Section label -->
    <text x="0" y="0" fill="#94a3b8" font-size="12" font-weight="700" letter-spacing="3">THREE PATTERNS</text>

    <!-- Pattern 1: Reasoning-in-the-Loop -->
    <g transform="translate(0,24)">
      <rect width="420" height="130" rx="14" fill="#13264a" stroke="#1e3a6b"/>
      <text x="20" y="32" fill="#22d3ee" font-size="12" font-weight="700" letter-spacing="2">PATTERN 1</text>
      <text x="20" y="56" fill="#ffffff" font-size="20" font-weight="700">Reasoning-in-the-Loop</text>
      <!-- Visual: cyan flow strip containing an orange agent node + human review -->
      <g transform="translate(20,74)">
        <rect width="380" height="44" rx="10" fill="none" stroke="url(#cyan)" stroke-width="2"/>
        <!-- start dot -->
        <circle cx="18" cy="22" r="5" fill="#22d3ee"/>
        <!-- connector -->
        <path d="M28 22 H78" stroke="#22d3ee" stroke-width="2"/>
        <!-- agent node (orange) -->
        <rect x="78" y="10" width="80" height="24" rx="6" fill="url(#orange)"/>
        <text x="118" y="27" fill="#0b1a33" font-size="11" font-weight="800" text-anchor="middle">AGENT</text>
        <path d="M158 22 H210" stroke="#22d3ee" stroke-width="2"/>
        <!-- human review node -->
        <rect x="210" y="10" width="100" height="24" rx="6" fill="#1e3a6b" stroke="#22d3ee"/>
        <!-- person glyph -->
        <circle cx="222" cy="19" r="3.5" fill="#22d3ee"/>
        <path d="M216 28 q6 -6 12 0" stroke="#22d3ee" stroke-width="2" fill="none"/>
        <text x="265" y="27" fill="#e2e8f0" font-size="11" font-weight="700" text-anchor="middle">HUMAN REVIEW</text>
        <path d="M310 22 H362" stroke="#22d3ee" stroke-width="2"/>
        <circle cx="368" cy="22" r="5" fill="#22d3ee"/>
      </g>
    </g>

    <!-- Pattern 2: Conversation-First -->
    <g transform="translate(0,170)">
      <rect width="420" height="130" rx="14" fill="#13264a" stroke="#1e3a6b"/>
      <text x="20" y="32" fill="#fb923c" font-size="12" font-weight="700" letter-spacing="2">PATTERN 2</text>
      <text x="20" y="56" fill="#ffffff" font-size="20" font-weight="700">Conversation-First Automation</text>
      <g transform="translate(20,74)">
        <!-- agent bubble left -->
        <rect x="0" y="6" width="80" height="32" rx="16" fill="url(#orange)"/>
        <text x="40" y="27" fill="#0b1a33" font-size="11" font-weight="800" text-anchor="middle">AGENT</text>
        <path d="M82 22 H120" stroke="#cbd5e1" stroke-width="2"/>
        <!-- workflow strip -->
        <rect x="120" y="10" width="180" height="24" rx="6" fill="none" stroke="url(#cyan)" stroke-width="2"/>
        <text x="210" y="27" fill="#22d3ee" font-size="11" font-weight="800" text-anchor="middle">WORKFLOW</text>
        <path d="M302 22 H338" stroke="#cbd5e1" stroke-width="2"/>
        <!-- agent bubble right -->
        <rect x="338" y="6" width="80" height="32" rx="16" fill="url(#orange)"/>
        <text x="378" y="27" fill="#0b1a33" font-size="11" font-weight="800" text-anchor="middle">AGENT</text>
      </g>
    </g>

    <!-- Pattern 3: Fire-and-Follow-up -->
    <g transform="translate(0,316)">
      <rect width="420" height="160" rx="14" fill="#13264a" stroke="#1e3a6b"/>
      <text x="20" y="32" fill="#a78bfa" font-size="12" font-weight="700" letter-spacing="2">PATTERN 3</text>
      <text x="20" y="56" fill="#ffffff" font-size="20" font-weight="700">Fire-and-Follow-up</text>
      <g transform="translate(20,98)">
        <!-- async callback arc above the row -->
        <path d="M340 14 C 340 -50, 60 -50, 60 14" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow)"/>
        <!-- agent bubble left -->
        <rect x="20" y="14" width="80" height="32" rx="16" fill="url(#orange)"/>
        <text x="60" y="35" fill="#0b1a33" font-size="11" font-weight="800" text-anchor="middle">AGENT</text>
        <!-- fire arrow -->
        <path d="M102 30 H218" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowLight)"/>
        <text x="160" y="22" fill="#cbd5e1" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="1">FIRE</text>
        <!-- workflow box -->
        <rect x="230" y="14" width="130" height="32" rx="6" fill="none" stroke="url(#cyan)" stroke-width="2"/>
        <text x="295" y="35" fill="#22d3ee" font-size="11" font-weight="800" text-anchor="middle">WORKFLOW</text>
      </g>
    </g>
  </g>

  <!-- Bottom-left blog mark (subtle) -->
  <g transform="translate(70,580)" opacity="0.75">
    <text x="0" y="0" fill="#64748b" font-size="14" font-weight="700" letter-spacing="2">THE CUSTOM ENGINE</text>
  </g>
</svg>
